name: 'NERVIQ Audit'
description: 'Audit AI coding agent setups across 8 platforms. Powered by 2,441 checks (~300 governance rules).'
inputs:
  threshold:
    description: 'Minimum score to pass (0-100)'
    required: false
    default: '50'
outputs:
  score:
    description: 'Audit score from the Nerviq CLI run'
    value: ${{ steps.audit.outputs.score }}
  passed:
    description: 'Number of passing checks'
    value: ${{ steps.audit.outputs.passed }}
  total:
    description: 'Total checks evaluated in this run'
    value: ${{ steps.audit.outputs.total }}
runs:
  using: 'composite'
  steps:
    - name: Run NERVIQ Audit
      shell: bash
      run: |
        RESULT=$(npx @nerviq/cli --json 2>/dev/null)
        SCORE=$(echo "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).score)")
        PASSED=$(echo "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).passed)")
        TOTAL=$(echo "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const r=JSON.parse(d);console.log(r.passed+r.failed)")
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "## NERVIQ Audit: $SCORE/100" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "$PASSED/$TOTAL checks passing" >> $GITHUB_STEP_SUMMARY
        if [ "$SCORE" -lt "${{ inputs.threshold }}" ]; then
          echo "::error::NERVIQ score $SCORE is below threshold ${{ inputs.threshold }}"
          exit 1
        fi
      id: audit
