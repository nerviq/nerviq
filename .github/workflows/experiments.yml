name: Experiments

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

permissions:
  contents: read

jobs:
  experiment:
    name: Platform audit (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - codex
          - gemini
          - copilot
          - cursor
          - windsurf
          - aider
          - opencode

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run platform audit
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          mkdir -p results
          node -e "const {audit}=require('./src/audit'); audit({dir:'.', platform:process.env.PLATFORM, silent:true}).then(r=>console.log(JSON.stringify({platform:process.env.PLATFORM,score:r.score,passed:r.passed,total:r.checkCount},null,2))).catch(err=>{console.error(err); process.exit(1);})" > "results/${PLATFORM}.json"
          cat "results/${PLATFORM}.json"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: experiment-${{ matrix.platform }}
          path: results/${{ matrix.platform }}.json

  summary:
    name: Experiment summary
    runs-on: ubuntu-latest
    needs: experiment
    if: always()

    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: artifacts
          pattern: experiment-*
          merge-multiple: true

      - name: Build summary markdown
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const resultsDir = path.join(process.cwd(), 'artifacts');
          const outputDir = path.join(process.cwd(), 'summary');
          const outputFile = path.join(outputDir, 'experiments-summary.md');
          const order = ['codex', 'gemini', 'copilot', 'cursor', 'windsurf', 'aider', 'opencode'];
          const rows = [];

          if (fs.existsSync(resultsDir)) {
            for (const file of fs.readdirSync(resultsDir).filter((name) => name.endsWith('.json'))) {
              const data = JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8'));
              rows.push(data);
            }
          }

          rows.sort((a, b) => order.indexOf(a.platform) - order.indexOf(b.platform));
          fs.mkdirSync(outputDir, { recursive: true });

          const lines = [
            '# Experiment Summary',
            '',
            '| Platform | Score | Passed | Total |',
            '| --- | ---: | ---: | ---: |',
          ];

          for (const row of rows) {
            lines.push(`| ${row.platform} | ${row.score} | ${row.passed} | ${row.total} |`);
          }

          if (rows.length === 0) {
            lines.push('| no-results | n/a | n/a | n/a |');
          }

          fs.writeFileSync(outputFile, lines.join('\n') + '\n', 'utf8');
          NODE
          cat summary/experiments-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: experiment-summary
          path: summary/experiments-summary.md
