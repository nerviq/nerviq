name: Experiments Multi-Platform

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-platforms:
    name: CLI platforms (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run CLI platform audits
        shell: bash
        run: |
          mkdir -p results
          for platform in codex gemini aider opencode; do
            PLATFORM="${platform}" node -e "const {audit}=require('./src/audit'); audit({dir:'.', platform:process.env.PLATFORM, silent:true}).then(r=>console.log(JSON.stringify({runner:'ubuntu-latest',platform:process.env.PLATFORM,score:r.score,passed:r.passed,total:r.checkCount},null,2))).catch(err=>{console.error(err); process.exit(1);})" > "results/${platform}.json"
            cat "results/${platform}.json"
          done

      - name: Upload Ubuntu results
        uses: actions/upload-artifact@v4
        with:
          name: experiments-ubuntu
          path: results/*.json

  macos-seatbelt:
    name: macOS seatbelt audit
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run macOS-specific audit
        shell: bash
        run: |
          mkdir -p results
          PLATFORM=codex node -e "const {audit}=require('./src/audit'); audit({dir:'.', platform:process.env.PLATFORM, silent:true}).then(r=>console.log(JSON.stringify({runner:'macos-latest',focus:'seatbelt-sandbox',platform:process.env.PLATFORM,score:r.score,passed:r.passed,total:r.checkCount},null,2))).catch(err=>{console.error(err); process.exit(1);})" > results/macos-codex.json
          cat results/macos-codex.json

      - name: Upload macOS results
        uses: actions/upload-artifact@v4
        with:
          name: experiments-macos
          path: results/macos-codex.json

  windows-hooks:
    name: Windows hooks and WSL audit
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Windows-specific audit
        shell: bash
        run: |
          mkdir -p results
          PLATFORM=codex node -e "const {audit}=require('./src/audit'); audit({dir:'.', platform:process.env.PLATFORM, silent:true}).then(r=>console.log(JSON.stringify({runner:'windows-latest',focus:'hooks-disabled-wsl',platform:process.env.PLATFORM,score:r.score,passed:r.passed,total:r.checkCount},null,2))).catch(err=>{console.error(err); process.exit(1);})" > results/windows-codex.json
          cat results/windows-codex.json

      - name: Upload Windows results
        uses: actions/upload-artifact@v4
        with:
          name: experiments-windows
          path: results/windows-codex.json
